# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - yangisamarkand

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js (standalone)
        run: npm run build

      - name: Prepare standalone package
        run: |
          # Debug: show standalone structure
          echo "=== Standalone directory structure ==="
          find .next/standalone -maxdepth 3 -type f -name "server.js"
          ls -la .next/standalone/
          
          # Find the directory containing server.js
          SERVER_JS=$(find .next/standalone -name "server.js" -type f | head -1)
          
          if [ -z "$SERVER_JS" ]; then
            echo "ERROR: server.js not found in standalone output!"
            exit 1
          fi
          
          SERVER_DIR=$(dirname "$SERVER_JS")
          echo "Found server.js at: $SERVER_JS"
          echo "Server directory: $SERVER_DIR"
          
          # Copy public assets and static files into the server directory
          cp -r public "$SERVER_DIR/"
          mkdir -p "$SERVER_DIR/.next/static"
          cp -r .next/static/. "$SERVER_DIR/.next/static/"
          
          # Create clean deploy directory
          mkdir -p deploy
          cp -r "$SERVER_DIR"/. deploy/
          
          echo "=== Deploy package contents ==="
          ls -la deploy/
          echo "=== Deploy package size ==="
          du -sh deploy/

      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deploy

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_8F6180B5C1344C04959C66FD5C36E2F7 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_4066CB90EE6D4022A7ED77CCDA6080EF }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_67119C2F6AD7432D845BF74B85800CD9 }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'yangisamarkand'
          slot-name: 'Production'
          package: .